<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Detail</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="container">
            <h1>Mini Shop</h1>
            <nav>
                <a href="index.html">Home</a>
                <span id="cart-count">Cart: 0</span>
            </nav>
        </div>
    </header>

    <main class="container">

        <section>
            <article class="card">

                <h2>Running Shoes</h2>

                <p>High quality running shoes designed for comfort and performance.</p>

                <p><strong>Price:</strong> 999 kr</p>

                <form>

                    <label for="quantity">Quantity</label>
                    <input type="number"
                           id="quantity"
                           name="quantity"
                           min="1"
                           value="1">

                    <button type="submit" class="btn add-btn">
                        Add to cart
                    </button>

                </form>

            </article>
        </section>

    </main>

    <footer>
        <div class="container">
            <p>&copy; 2025 Mini Shop</p>
        </div>
    </footer>

    <script src="script.js"></script>

</body>
</html>
