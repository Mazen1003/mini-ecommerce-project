<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Shop</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="container">
            <h1>Mini Shop</h1>
            <nav>
                <a href="index.html">Home</a>
                <a href="page2.html">Product Detail</a>
                <span id="cart-count">Cart: 0</span>
            </nav>
        </div>
    </header>

    <main class="container">
        <section>
            <h2>Products</h2>

            <article class="card">
                <h3>Running Shoes</h3>
                <p>Price: 999 kr</p>
                <button class="btn add-btn">Add to cart</button>
            </article>

            <article class="card">
                <h3>Sports Jacket</h3>
                <p>Price: 1299 kr</p>
                <button class="btn add-btn">Add to cart</button>
            </article>

        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2025 Mini Shop</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
